databases:
  - name: salescast-db
    databaseName: sales_forecast
    user: salescast
    plan: free

services:
  - type: web
    name: salescast-ai
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: salescast-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MODELS_DIR
        value: ./trained_models
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20"
