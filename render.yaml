services:
  - type: web
    name: salescast-ai
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./sales_forecast.db
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MODELS_DIR
        value: ./trained_models
